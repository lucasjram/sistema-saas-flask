<!DOCTYPE html>
<html>
<head>
<title>Editar Produto</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h3>Editar Produto</h3>

<form method="POST">

<div class="mb-3">
<label>Nome</label>
<input type="text" name="nome" class="form-control" value="{{ produto[1] }}">
</div>

<div class="mb-3">
<label>Preço</label>
<input type="number" step="0.01" name="preco" class="form-control" value="{{ produto[2] }}">
</div>

<div class="mb-3">
<label>Estoque</label>
<input type="number" name="estoque" class="form-control" value="{{ produto[3] }}">
</div>

<button class="btn btn-success">Salvar</button>

<a href="/dashboard" class="btn btn-secondary">Voltar</a>

</form>

</div>

</div>

</body>
</html>
