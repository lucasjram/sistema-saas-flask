<!DOCTYPE html>
<html>
<head>
    <title>Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4 mb-4">
        <h2>👤 {{ cliente[1] }}</h2>
        <p><strong>Telefone:</strong> {{ cliente[2] }}</p>
        <p><strong>Total gasto:</strong> R$ {{ total_gasto }}</p>
        <a href="/dashboard" class="btn btn-secondary">Voltar</a>
    </div>

    <div class="card shadow p-4">
        <h4>📜 Histórico de Compras</h4>

        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID Venda</th>
                    <th>Total</th>
                    <th>Data</th>
                </tr>
            </thead>
            <tbody>
                {% for venda in vendas %}
                <tr>
                    <td>{{ venda[0] }}</td>
                    <td>R$ {{ venda[1] }}</td>
                    <td>{{ venda[2] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
